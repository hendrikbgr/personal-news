services:
  personal-news:
    build: .
    container_name: personal-news
    restart: unless-stopped
    ports:
      - "3003:3000"
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
